<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Booking | MelArt Studio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#f5f5f5;
font-family:Poppins,sans-serif;
}

.navbar{
background:#111;
}

.navbar-brand{
font-weight:bold;
color:#FFD700 !important;
}

.banner{

height:250px;

background:linear-gradient(rgba(0,0,0,.6),
rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=1600");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.card{

border:none;
border-radius:20px;

}

.btn-warning{

background:#FFD700;
font-weight:bold;

}

footer{

background:#111;
color:white;
padding:25px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="index.html">

📸 MelArt Studio

</a>

</div>

</nav>

<section class="banner">

<h1>Booking Jasa Foto & Videografi</h1>

</section>

<div class="container my-5">

<div class="card shadow p-4">

<h3 class="mb-4 text-center">

Form Booking

</h3>

<form id="bookingForm">

<div class="row">

<div class="col-md-6">

<label>Nama Lengkap</label>

<input
type="text"
id="nama"
class="form-control"
placeholder="Masukkan Nama"
required>

</div>

<div class="col-md-6">

<label>No WhatsApp</label>

<input
type="text"
id="wa"
class="form-control"
placeholder="08xxxxxxxxxx"
required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>Jenis Layanan</label>

<select
id="layanan"
class="form-control"
required>

<option value="">Pilih</option>

<option>Foto Wisuda</option>

<option>Wedding</option>

<option>Prewedding</option>

<option>Foto Produk</option>

<option>Video Event</option>

<option>Company Profile</option>

</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Paket</label>

<select
id="paket"
class="form-control">

<option>Basic</option>

<option>Silver</option>

<option>Gold</option>

<option>Platinum</option>

</select>

</div>

<div class="col-md-6">

<label>Tanggal Booking</label>

<input
type="date"
id="tanggal"
class="form-control"
required>

</div>

</div>

<br>

<label>Lokasi Pemotretan</label>

<textarea
id="lokasi"
class="form-control"
rows="3"
required></textarea>

<br>

<label>Catatan Tambahan</label>

<textarea
class="form-control"
rows="4"></textarea>

<br>

<button
class="btn btn-warning w-100">

<i class="fa-solid fa-floppy-disk"></i>

Simpan Booking

</button>

</form>

</div>

</div>

<footer class="text-center">

© 2026 MelArt Studio

</footer>

<script>

document.getElementById("bookingForm").addEventListener("submit",function(e){

e.preventDefault();

let nama=document.getElementById("nama").value;

let wa=document.getElementById("wa").value;

let email=document.getElementById("email").value;

let layanan=document.getElementById("layanan").value;

let paket=document.getElementById("paket").value;

let tanggal=document.getElementById("tanggal").value;

let lokasi=document.getElementById("lokasi").value;

let data=JSON.parse(localStorage.getItem("booking"))||[];

data.push({

nama,

wa,

email,

layanan,

paket,

tanggal,

lokasi

});

localStorage.setItem("booking",JSON.stringify(data));

alert("Booking berhasil disimpan!");

window.location="daftar-booking.html";

});

</script>

</body>

</html>
