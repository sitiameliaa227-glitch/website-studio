<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran | MelArt Studio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.navbar{
    background:#111;
}

.navbar-brand{
    color:#FFD700 !important;
    font-weight:bold;
}

.card{
    border:none;
    border-radius:15px;
}

.btn-warning{
    background:#FFD700;
    color:#000;
    font-weight:bold;
}

footer{
    background:#111;
    color:white;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">
<a href="index.html" class="navbar-brand">📸 MelArt Studio</a>
</div>
</nav>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
Data Pembayaran
</h2>

<table class="table table-bordered">

<tr>
<th>Nama Bank</th>
<td>Bank MANDIRI</td>
</tr>

<tr>
<th>Nomor Rekening</th>
<td>1220015184800</td>
</tr>

<tr>
<th>Atas Nama</th>
<td>MelArt Studio</td>
</tr>

<tr>
<th>Minimal DP</th>
<td>30% dari total paket</td>
</tr>

</table>

<hr>

<h4>Upload Bukti Pembayaran</h4>

<form>

<div class="mb-3">

<label>Nama Pemesan</label>

<input
type="text"
class="form-control"
placeholder="Masukkan Nama">

</div>

<div class="mb-3">

<label>Pilih Paket</label>

<select class="form-control">

<option>Basic</option>
<option>Silver</option>
<option>Gold</option>
<option>Platinum</option>

</select>

</div>

<div class="mb-3">

<label>Total Pembayaran</label>

<input
type="number"
class="form-control"
placeholder="Masukkan Nominal">

</div>

<div class="mb-3">

<label>Upload Bukti Transfer</label>

<input
type="file"
class="form-control">

</div>

<button
class="btn btn-warning w-100">

Kirim Bukti Pembayaran

</button>

</form>

</div>

</div>

<footer class="text-center">

© 2026 MelArt Studio

</footer>

</body>
</html>
