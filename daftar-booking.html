<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar Booking | MelArt Studio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.navbar{
background:#111;
}

.navbar-brand{
color:#FFD700 !important;
font-weight:bold;
}

.table{
background:white;
}

footer{

margin-top:40px;
padding:20px;
background:#111;
color:white;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a href="index.html"
class="navbar-brand">

📸 MelArt Studio

</a>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">

Daftar Booking

</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>No</th>

<th>Nama</th>

<th>WhatsApp</th>

<th>Layanan</th>

<th>Paket</th>

<th>Tanggal</th>

<th>Lokasi</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="dataBooking">

</tbody>

</table>

</div>

<footer class="text-center">

© 2026 MelArt Studio

</footer>

<script>

let data=JSON.parse(localStorage.getItem("booking"))||[];

let tabel=document.getElementById("dataBooking");

tampil();

function tampil(){

tabel.innerHTML="";

data.forEach((item,index)=>{

tabel.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${item.nama}</td>

<td>${item.wa}</td>

<td>${item.layanan}</td>

<td>${item.paket}</td>

<td>${item.tanggal}</td>

<td>${item.lokasi}</td>

<td>

<button
class="btn btn-danger btn-sm"
onclick="hapus(${index})">

Hapus

</button>

</td>

</tr>

`;

});

}

function hapus(index){

if(confirm("Yakin ingin menghapus booking ini?")){

data.splice(index,1);

localStorage.setItem("booking",JSON.stringify(data));

tampil();

}

}

</script>

</body>
</html>
